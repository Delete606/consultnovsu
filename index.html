<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>НовГУ - Вход в систему консультаций</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">
                <img src="images.png" alt="НовГУ" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2256%22 height=%2256%22%3E%3Crect fill=%22%23ffd700%22 width=%2256%22 height=%2256%22 rx=%2212%22/%3E%3Ctext fill=%22%23003d7c%22 x=%2250%25%22 y=%2255%25%22 font-size=%2224%22 text-anchor=%22middle%22 dy=%22.3em%22 font-weight=%22bold%22%3EНовГУ%3C/text%3E%3C/svg%3E'">
            </div>
            <h1>Новгородский государственный университет</h1>
            <p>Система записи на консультации</p>
        </div>
        <div class="auth-card">
            <div class="role-selector" id="roleSelector">
                <button class="role-btn active" data-role="student"><span class="role-icon"></span><span>Студент</span></button>
                <button class="role-btn" data-role="teacher"><span class="role-icon"></span><span>Преподаватель</span></button>
                <button class="role-btn" data-role="admin"><span class="role-icon"></span><span>Админ</span></button>
            </div>
            <form id="loginForm">
                <div class="form-group"><label for="loginEmail">Email</label><input type="email" id="loginEmail" required placeholder="ivan@student.novsu.ru" value="student@novsu.ru"></div>
                <div class="form-group"><label for="loginPassword">Пароль</label><input type="password" id="loginPassword" required placeholder="Введите пароль" value="123"></div>
                <div id="loginError" class="error-message"></div>
                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Войти в систему</button>
            </form>
            <div class="demo-section">
                <h4>Демо-доступы (нажмите для автозаполнения):</h4>
                <div class="demo-credentials">
                    <div class="demo-item" data-email="student@novsu.ru" data-password="123" data-role="student"><span class="demo-role">Студент</span><span class="demo-login">student@novsu.ru / 123</span></div>
                    <div class="demo-item" data-email="teacher@novsu.ru" data-password="123" data-role="teacher"><span class="demo-role">Преподаватель</span><span class="demo-login">teacher@novsu.ru / 123</span></div>
                    <div class="demo-item" data-email="admin@novsu.ru" data-password="admin" data-role="admin"><span class="demo-role">Администратор</span><span class="demo-login">admin@novsu.ru / admin</span></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = window.supabase.createClient('https://bimdjjmdxoygeucdzlmu.supabase.co','sb_publishable_NPy8IPzsq37ts76xKbsCDQ_hZNIwUje');
        let selectedRole='student';

        (function(){const s=sessionStorage.getItem('currentUser');if(s){try{const u=JSON.parse(s);if(u&&u.role)redirectByRole(u.role);}catch(e){}}})();

        document.addEventListener('DOMContentLoaded',function(){
            document.getElementById('loginEmail').value='student@novsu.ru';
            document.getElementById('loginPassword').value='123';
            document.querySelectorAll('.role-btn').forEach(btn=>{btn.addEventListener('click',function(){document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');selectedRole=this.dataset.role;const ei=document.getElementById('loginEmail'),pi=document.getElementById('loginPassword');switch(selectedRole){case'student':ei.value='student@novsu.ru';pi.value='123';break;case'teacher':ei.value='teacher@novsu.ru';pi.value='123';break;case'admin':ei.value='admin@novsu.ru';pi.value='admin';break;}hideError();clearErrors();});});
            document.querySelectorAll('.demo-item').forEach(item=>{item.addEventListener('click',function(){document.getElementById('loginEmail').value=this.dataset.email;document.getElementById('loginPassword').value=this.dataset.password;document.querySelectorAll('.role-btn').forEach(btn=>{btn.classList.remove('active');if(btn.dataset.role===this.dataset.role)btn.classList.add('active');});selectedRole=this.dataset.role;hideError();clearErrors();this.style.backgroundColor='#e8f0fe';setTimeout(()=>{this.style.backgroundColor='';},300);});});
            document.getElementById('loginForm').addEventListener('submit',handleLogin);
            document.getElementById('loginEmail').addEventListener('input',function(){this.classList.remove('error');hideError();});
            document.getElementById('loginPassword').addEventListener('input',function(){this.classList.remove('error');hideError();});
        });

        async function handleLogin(e){
            e.preventDefault();
            const ei=document.getElementById('loginEmail'),pi=document.getElementById('loginPassword'),btn=document.getElementById('loginBtn');
            const email=ei.value.trim(),password=pi.value.trim();
            hideError();clearErrors();
            if(!email){ei.classList.add('error');showError('Введите email');return;}
            if(!password){pi.classList.add('error');showError('Введите пароль');return;}
            btn.disabled=true;btn.textContent='Проверка...';
            try{
                const{data,error}=await _supabase.from('users').select('*').eq('email',email).eq('password',password).eq('role',selectedRole).eq('active',true).single();
                if(error||!data){
                    const{data:ube}=await _supabase.from('users').select('role').eq('email',email).single();
                    if(!ube)showError('Пользователь не найден');
                    else if(ube.role!==selectedRole){const rn={student:'Студент',teacher:'Преподаватель',admin:'Администратор'};showError(`Этот email принадлежит роли "${rn[ube.role]||ube.role}"`);}
                    else showError('Неверный пароль');
                    ei.classList.add('error');pi.classList.add('error');document.getElementById('loginForm').classList.add('shake');setTimeout(()=>document.getElementById('loginForm').classList.remove('shake'),500);
                    btn.disabled=false;btn.textContent='Войти в систему';return;
                }
                sessionStorage.setItem('currentUser',JSON.stringify({id:data.id,name:data.name,surname:data.surname,email:data.email,role:data.role,phone:data.phone||''}));
                redirectByRole(data.role);
            }catch(err){showError('Ошибка соединения');btn.disabled=false;btn.textContent='Войти в систему';}
        }

        function showError(m){const d=document.getElementById('loginError');d.textContent=m;d.classList.add('show');}
        function hideError(){document.getElementById('loginError').classList.remove('show');}
        function clearErrors(){document.getElementById('loginEmail').classList.remove('error');document.getElementById('loginPassword').classList.remove('error');}
        function redirectByRole(r){const bp=window.location.pathname.replace(/[^/]*$/,'');switch(r){case'student':window.location.href=bp+'student.html';break;case'teacher':window.location.href=bp+'teacher.html';break;case'admin':window.location.href=bp+'admin.html';break;default:window.location.href=bp+'index.html';}}
    </script>
</body>
</html>
